<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Task Manager</h1>
        <p class="subtitle">Organizá tus tareas de forma simple</p>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="showTab('login')">Iniciar sesión</div>
            <div class="tab" onclick="showTab('register')">Registrarse</div>
        </div>

        <!-- Mensaje de error -->
        <div class="error" id="error-msg"></div>

        <!-- Formulario de Login -->
        <div id="login-form">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="login-username" placeholder="Tu nombre de usuario">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="login-password" placeholder="Tu contraseña">
            </div>
            <button class="btn btn-primary" onclick="login()">Iniciar sesión</button>
        </div>

        <!-- Formulario de Registro -->
        <div id="register-form" style="display: none;">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="register-email" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="register-username" placeholder="Tu nombre de usuario">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="register-password" placeholder="Tu contraseña">
            </div>
            <button class="btn btn-primary" onclick="register()">Registrarse</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
